<div class="prefs-toolbar" aria-label="主题">
    <div class="prefs-group" role="group" aria-label="主题">
        <button type="button" class="prefs-btn prefs-btn--theme{% if site_theme == 'light' %} active{% endif %}" data-theme-set="light" title="白天">☀️</button>
        <button type="button" class="prefs-btn prefs-btn--theme{% if site_theme == 'dark' %} active{% endif %}" data-theme-set="dark" title="夜晚">🌙</button>
    </div>
</div>
