{% load static %}
<!DOCTYPE html>
<html lang="{{ html_lang }}" data-theme="{{ site_theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    (function () {
        var t = localStorage.getItem('site_theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    })();
    </script>
    <title>管理后台登录 - 干饭情报局</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-body">
    <div class="login-container">
        <div style="display:flex;justify-content:center;margin-bottom:16px;">{% include 'partials/preferences_bar.html' %}</div>
        <div class="login-card glass">
            <div class="login-header">
                <h1>🍜 干饭情报局</h1>
                <p>管理员登录</p>
            </div>
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message message-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            <form method="post" class="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required>
                </div>
                <div style="display:flex;gap:10px;">
                    <button type="submit" class="btn btn-primary" style="flex:1;">登录</button>
                    <button type="button" class="btn btn-secondary" onclick="location.reload();" title="刷新页面">🔄 刷新</button>
                </div>
            </form>
            <div class="login-footer">
                <a href="{% url 'index' %}">返回前台</a>
                <p class="footer-icp">
                    <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">豫ICP备2026020102号</a>
                </p>
            </div>
        </div>
    </div>
    <script src="{% static 'js/site.js' %}"></script>
</body>
</html>
