{% load static %}
<!DOCTYPE html>
<html lang="{{ html_lang }}" data-theme="{{ site_theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    (function () {
        var t = localStorage.getItem('site_theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    })();
    </script>
    <title>内测验证 - 干饭情报局</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="user-body">
    <div class="maintenance-page">
        <div class="maintenance-card glass beta-gate-card">
            <div class="maintenance-toolbar">{% include 'partials/preferences_bar.html' %}</div>
            <span class="maintenance-icon">🎫</span>
            <h1>内测邀请</h1>
            <p class="text-muted">本站处于内测阶段，请输入管理员提供的邀请码后继续。</p>
            {% if error %}
            <p class="beta-gate-error">邀请码错误，请检查后重试</p>
            {% endif %}
            <form method="post" class="beta-gate-form">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                <div class="form-group">
                    <label for="invite_code">内测邀请码</label>
                    <input type="text" id="invite_code" name="invite_code" required
                           placeholder="请输入邀请码" autocomplete="off"
                           autocapitalize="characters" spellcheck="false" maxlength="32">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">进入内测</button>
            </form>
            <p class="maintenance-hint text-muted">没有邀请码？请联系管理员获取。</p>
            <a href="{% url 'admin_login' %}" class="btn btn-link">管理员登录</a>
            <p class="footer-icp maintenance-icp">
                <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">豫ICP备2026020102号</a>
            </p>
        </div>
    </div>
    <script src="{% static 'js/site.js' %}"></script>
</body>
</html>
