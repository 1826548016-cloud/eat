{% extends 'base.html' %}
{% block title %}注册 - 干饭情报局{% endblock %}
{% block content %}
<div class="page-auth">
    <div class="login-card glass">
        <div class="login-header">
            <span class="login-logo">🍜</span>
            <h1>加入社区</h1>
            <p>注册后即可发布情报、参与评论</p>
        </div>
        <form method="post" class="login-form">
            {% csrf_token %}
            {% if require_beta_code %}
            <div class="form-group">
                <label>内测邀请码 *</label>
                <input type="text" name="invite_code" required maxlength="32"
                       placeholder="请输入邀请码" autocapitalize="characters" style="text-transform:uppercase;">
            </div>
            {% endif %}
            <div class="form-group">
                <label>用户名 *</label>
                <input type="text" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码 *</label>
                <input type="password" name="password" required minlength="4" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>确认密码 *</label>
                <input type="password" name="password2" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" autocomplete="email">
            </div>
            <div class="form-group">
                <label>校区 / 院系</label>
                <input type="text" name="campus" placeholder="如：南湖校区 · 计算机学院">
            </div>
            <div class="form-group">
                <label>手机号</label>
                <input type="text" name="phone" autocomplete="tel">
            </div>
            <div class="form-group agree-box">
                <label class="agree-label">
                    <input type="checkbox" name="agree_disclaimer" value="1" required>
                    {% url 'disclaimer' as disclaimer_url %}
                    我已阅读并同意 <a href="{{ disclaimer_url }}" target="_blank">《免责声明与用户须知》</a>，承诺不发布广告、不侵犯他人隐私、不恶意发布、不以任何手段篡改本站信息，并对本人发布内容承担法律责任
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
        <div class="login-footer">
            <p>已有账号？<a href="{% url 'user_login' %}">去登录</a></p>
        </div>
    </div>
</div>
{% endblock %}
